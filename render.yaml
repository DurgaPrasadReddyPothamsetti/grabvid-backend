services:
  - type: web
    name: grabvid-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ./yt-dlp && chmod a+rx ./yt-dlp
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: YTDLP_PATH
        value: ./yt-dlp
      - key: PORT
        value: 3000
